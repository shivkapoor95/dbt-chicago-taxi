version: 2

models:
  - name: stg_taxi_trips
    columns:
      - name: unique_key
        tests:
          - unique:
              config:
                severity: warn
          - not_null
      - name: taxi_id
        tests:
          - not_null
      - name: trip_start_timestamp
        tests:
          - not_null
      - name: trip_end_timestamp
        tests:
          - not_null:
              config:
                severity: warn
      - name: trip_total
        tests:
          - not_null:
              config:
                severity: warn
      - name: payment_type
        tests:
          - not_null